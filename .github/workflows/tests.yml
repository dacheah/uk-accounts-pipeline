name: tests

# Golden-file + unit tests for the iXBRL parser, normaliser, and benchmark grader.
# The golden files pin the exact normalised record for both fixtures, so any
# behavioural change to parse_ixbrl.py / normalise.py fails CI with a field-level diff.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -q
